[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# PWA specific headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=3600"

# CRON Jobs Configuration
[functions]
  node_bundler = "esbuild"

[functions."cron-timeSync"]
schedule = "*/1 * * * *" # Every minute

# Environment Variables
[build.environment]
  NODE_VERSION = "18"
  MONGODB_URI = "mongodb+srv://bellsysteminsightcollege_db_user:iccollegebellsystemdb@ic-college-bell-system.2fsh6xl.mongodb.net/?appName=ic-college-bell-system"

[context.production.environment]
  MQTT_HOST = "48e3c51d44b14f35b72ca829f22f0f4e.s1.eu.hivemq.cloud"
  MQTT_PORT = "8883"
  MQTT_USERNAME = "ic-college-automated-bell-system"
